name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Fast Python tests - run on every push and PR
  python-tests-fast:
    name: Python Tests (Fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install responses
          pip install -e .
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Node.js dependencies and build
        run: npm ci && npm run build
      
      - name: Run fast Python tests
        run: python -m pytest tests/ -v --tb=short -m "not slow"

  # Slow Python tests - run only on PRs (including from forks)
  python-tests-slow:
    name: Python Tests (Slow/E2E)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install responses
      
      - name: Run slow Python tests
        run: python -m pytest tests/ -v --tb=short -m "slow"

  # TypeScript unit tests - run on every push and PR
  typescript-tests:
    name: TypeScript Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Node.js dependencies
        run: npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Run TypeScript unit tests
        run: npm test

  # Playwright E2E tests - run only on PRs
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install responses
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Node.js dependencies
        run: npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run Playwright E2E tests
        run: npm run test:e2e
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # Combined status check for main/master branch protection
  all-tests-pass:
    name: All Required Tests Passed
    needs: [python-tests-fast, python-tests-slow, typescript-tests, e2e-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all required tests passed
        run: |
          FAST_PASSED="${{ needs.python-tests-fast.result }}"
          SLOW_RESULT="${{ needs.python-tests-slow.result }}"
          TYPESCRIPT_PASSED="${{ needs.typescript-tests.result }}"
          E2E_RESULT="${{ needs.e2e-tests.result }}"
          
          if [ "$FAST_PASSED" == "success" ] && \
             ( [ "$SLOW_RESULT" == "success" ] || [ "$SLOW_RESULT" == "skipped" ] ) && \
             [ "$TYPESCRIPT_PASSED" == "success" ] && \
             ( [ "$E2E_RESULT" == "success" ] || [ "$E2E_RESULT" == "skipped" ] ); then
            echo "✓ All required tests passed"
            exit 0
          else
            echo "✗ Some required tests failed"
            exit 1
          fi