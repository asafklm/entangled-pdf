<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{FILENAME}}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #333; height: 100%; overflow: hidden; font-family: sans-serif; }
        #viewer-container {
            height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
            display: flex; flex-direction: column; align-items: center;
        }
        .page-wrapper { margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        canvas { display: block; max-width: 100%; height: auto; }
        #status {
            position: fixed; top: 20px; right: 20px; padding: 10px;
            background: rgba(0,0,0,0.8); color: white; border-radius: 8px;
            z-index: 100; display: none; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="status">Syncing...</div>
    <div id="viewer-container"></div>

    <script>
        const container = document.getElementById('viewer-container');
        const statusMsg = document.getElementById('status');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        const pageElements = {};

	async function loadPDF() {
	    pdfDoc = await pdfjsLib.getDocument('/get-pdf').promise;
	    container.innerHTML = '';
	    
	    // Detect the Retina scale (usually 2.0 or 3.0 on iPad)
	    const outputScale = window.devicePixelRatio || 1;

	    for (let i = 1; i <= pdfDoc.numPages; i++) {
		const page = await pdfDoc.getPage(i);
		
		// Base scale (1.5) multiplied by the screen density
		const viewport = page.getViewport({ scale: 1.5 * outputScale });
		
		const wrapper = document.createElement('div');
		wrapper.className = 'page-wrapper';
		
		const canvas = document.createElement('canvas');
		const context = canvas.getContext('2d');

		// Set the actual internal resolution
		canvas.width = Math.floor(viewport.width);
		canvas.height = Math.floor(viewport.height);

		// Use CSS to scale it back down to a readable size
		// This makes the internal pixels "tighter"
		canvas.style.width = Math.floor(viewport.width / outputScale) + "px";
		canvas.style.height = Math.floor(viewport.height / outputScale) + "px";

		wrapper.appendChild(canvas);
		container.appendChild(wrapper);

		const renderContext = {
		    canvasContext: context,
		    viewport: viewport
		};
		
		await page.render(renderContext).promise;
		pageElements[i] = wrapper;
	    }
}

        function scrollToPage(pageNum) {
            const target = pageElements[pageNum];
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // --- THE REFOCUS SYNC LOGIC ---
        async function syncState() {
            try {
                const res = await fetch('/current-state');
                const data = await res.json();
                scrollToPage(data.page);
            } catch (e) { console.error("Sync error", e); }
        }

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                console.log("Welcome back! Syncing position...");
                syncState();
            }
        });

        // --- WEBSOCKET ---
        const socket = new WebSocket(`ws://${window.location.hostname}:{{PORT}}/ws`);
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.action === "reload") {
                scrollToPage(data.page);
            }
        };

        loadPDF().then(() => syncState());
    </script>
</body>
</html>
