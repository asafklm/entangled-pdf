<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom PDF Viewer with Coordinates</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevent double scrollbars */
        }
        #pdf-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        id="pdf-frame" 
        src="pdfjs-dist/web/viewer.html?file=/example.pdf#zoom=200,0,500&page=2">
    </iframe>

</body>
</html>
