<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{FILENAME}}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #333; height: 100%; overflow: hidden; font-family: sans-serif; }
        #viewer-container {
            height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
            text-align: center;
            padding: 20px;
        }
        .page-wrapper { 
            display: inline-block;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            max-width: 100%;
        }
        canvas { 
            display: block; 
        }
        .synctex-marker {
            position: absolute;
            left: -15px;
            width: 10px;
            height: 10px;
            background-color: rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.6);
            z-index: 10;
            pointer-events: none;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        #status {
            position: fixed; top: 20px; right: 20px; padding: 10px;
            background: rgba(0,0,0,0.8); color: white; border-radius: 8px;
            z-index: 100; display: none; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="status">Syncing...</div>
    <div id="viewer-container"></div>

    <script>
        const container = document.getElementById('viewer-container');
        const statusMsg = document.getElementById('status');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        const pageElements = {};

	async function loadPDF() {
	    pdfDoc = await pdfjsLib.getDocument('/get-pdf').promise;
	    container.innerHTML = '';

	    for (let i = 1; i <= pdfDoc.numPages; i++) {
		const page = await pdfDoc.getPage(i);

		const containerWidth = container.clientWidth - 40; // padding/margin
		
		// Calculate scale to fit container but ensure minimum quality
		// On mobile: ensure at least 1.5x scale for crisp text
		const dpr = window.devicePixelRatio || 1;
		const pageWidthAt1x = page.getViewport({ scale: 1.0 }).width;
		const fitScale = containerWidth / pageWidthAt1x;
		const scale = Math.max(1.5, fitScale); // Minimum 1.5x to prevent blur
		
		const viewport = page.getViewport({ scale: scale });

		const wrapper = document.createElement('div');
		wrapper.className = 'page-wrapper';

		const canvas = document.createElement('canvas');
		const context = canvas.getContext('2d');

		// Get device pixel ratio - NO LIMITS for testing blur issue
		const outputScaleX = window.devicePixelRatio || 1;
		const outputScaleY = window.devicePixelRatio || 1;

		// Calculate canvas dimensions at full device resolution
		const canvasWidth = Math.round(viewport.width * outputScaleX);
		const canvasHeight = Math.round(viewport.height * outputScaleY);

		// Set internal canvas resolution (physical pixels) - NO LIMITS
		canvas.width = canvasWidth;
		canvas.height = canvasHeight;

		// Set CSS display size (logical pixels) - critical for sharp rendering
		canvas.style.width = Math.round(viewport.width) + 'px';
		canvas.style.height = Math.round(viewport.height) + 'px';

		wrapper.appendChild(canvas);
		container.appendChild(wrapper);

		// Use transform matrix for precise scaling (PDF.js best practice)
		const transform = outputScaleX !== 1 || outputScaleY !== 1
		    ? [outputScaleX, 0, 0, outputScaleY, 0, 0]
		    : null;

		await page.render({
		    canvasContext: context,
		    viewport: viewport,
		    transform: transform
		}).promise;
		pageElements[i] = wrapper;
	    }
	}


        function scrollToPage(pageNum, x, y) {
            const target = pageElements[pageNum];
            if (!target) return;
            
            if (y == null) {  // Check for null or undefined (Python None becomes null)
                target.scrollIntoView({ block: 'start' });
                return;
            }
            
            // Calculate vertical position to center y coordinate in viewport
            const canvas = target.querySelector('canvas');
            const cssHeight = parseFloat(canvas.style.height);
            const internalHeight = canvas.height;
            const dpr = window.devicePixelRatio || 1;
            
            // Calculate render scale: converts PDF points to CSS pixels
            const renderScale = (cssHeight * dpr) / internalHeight;
            
            // Convert PDF y-coordinate (in points) to CSS pixels
            const pixelY = y * renderScale;
            
            // Calculate scroll position to center vertically
            const viewportHeight = container.clientHeight;
            const targetScrollTop = target.offsetTop + pixelY - (viewportHeight / 2);
            const finalScrollTop = Math.max(0, Math.round(targetScrollTop));
            
            // Safari-compatible scrolling: use scrollTo with RAF + setTimeout
            requestAnimationFrame(() => {
                setTimeout(() => {
                    // Method 1: Try container.scrollTo
                    container.scrollTo({
                        top: finalScrollTop,
                        left: 0,
                        behavior: 'auto'
                    });
                    
                    // Method 2: Fallback to scrollTop property
                    setTimeout(() => {
                        if (Math.abs(container.scrollTop - finalScrollTop) > 5) {
                            container.scrollTop = finalScrollTop;
                        }
                    }, 50);
                }, 0);
            });
        }

        function showRedDot(pageNum, y) {
            const target = pageElements[pageNum];
            if (!target || y == null) return;
            
            // Remove any existing markers
            const existingMarker = target.querySelector('.synctex-marker');
            if (existingMarker) {
                existingMarker.remove();
            }
            
            // Get canvas and calculate position
            const canvas = target.querySelector('canvas');
            const cssHeight = parseFloat(canvas.style.height);
            const internalHeight = canvas.height;
            const dpr = window.devicePixelRatio || 1;
            const renderScale = (cssHeight * dpr) / internalHeight;
            const pixelY = y * renderScale;
            
            // Create red dot marker
            const marker = document.createElement('div');
            marker.className = 'synctex-marker';
            marker.style.top = (pixelY - 5) + 'px'; // Center the 10px dot
            
            // Add marker to page wrapper
            target.style.position = 'relative';
            target.appendChild(marker);
            
            // Auto-remove after 3 seconds
            setTimeout(() => {
                if (marker.parentNode) {
                    marker.remove();
                }
            }, 3000);
        }

        // --- THE REFOCUS SYNC LOGIC ---
        async function syncState() {
            try {
                const res = await fetch('/current-state');
                const data = await res.json();
                scrollToPage(data.page, undefined, undefined);
            } catch (e) { console.error("Sync error", e); }
        }

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                console.log("Welcome back! Syncing position...");
                syncState();
            }
        });

        // --- WEBSOCKET ---
        const socket = new WebSocket(`ws://${window.location.hostname}:{{PORT}}/ws`);
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.action === "synctex") {
                scrollToPage(data.page, data.x, data.y);
                
                // Show red dot marker at synctex position
                if (data.y != null) {
                    showRedDot(data.page, data.y);
                }
            }
        };

        loadPDF().then(() => syncState());
    </script>
</body>
</html>
